<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖片瀏覽器</title>
    <!-- 引入 Tailwind CSS 以快速進行介面設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 圖片載入時的漸變過渡效果 */
        #lightboxImg {
            transition: opacity 0.2s ease-in-out;
        }
        
        /* 隱藏捲軸但保持可捲動 (美化外觀) */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }

        /* 圖片網格懸浮效果 */
        .img-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .img-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans selection:bg-blue-500 selection:text-white">

    <!-- 全局載入畫面 (Page Loader) -->
    <div id="pageLoader" class="fixed inset-0 z-[100] bg-gray-900 flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative flex items-center justify-center h-20 w-20">
            <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500 absolute"></div>
            <div class="animate-spin rounded-full h-16 w-16 border-r-4 border-l-4 border-blue-300 absolute opacity-50" style="animation-direction: reverse; animation-duration: 1.5s;"></div>
        </div>
        <p id="loadingText" class="mt-4 text-blue-400 font-medium tracking-widest animate-pulse">載入中... 0%</p>
    </div>

    <!-- 頁首標題 -->
    <header class="sticky top-0 z-40 bg-gray-900/90 backdrop-blur-sm border-b border-gray-800 shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6 text-blue-400">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
                </svg>
                董濟綸的畫廊
            </h1>
            <span class="text-sm text-gray-400" id="totalCountDisplay">共 37 張圖片</span>
        </div>
    </header>

    <!-- 圖片網格區塊 -->
    <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
        <div id="gallery" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6">
            <!-- 圖片會由 JavaScript 動態生成並插入於此 -->
        </div>
    </main>

    <!-- 燈箱 (Lightbox) 全螢幕預覽 -->
    <div id="lightbox" class="fixed inset-0 bg-black/95 hidden z-50 flex flex-col items-center justify-center opacity-0 transition-opacity duration-300">
        
        <!-- 頂部控制列 -->
        <div class="absolute top-0 left-0 right-0 p-4 flex justify-between items-center z-50 bg-gradient-to-b from-black/60 to-transparent pointer-events-none">
            <div id="imageCounter" class="text-white text-lg font-medium drop-shadow-md pointer-events-auto bg-black/40 px-3 py-1 rounded-full"></div>
            <button id="closeBtn" class="text-white hover:text-red-400 transition-colors pointer-events-auto bg-black/40 p-2 rounded-full" title="關閉 (Esc)">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- 左側上一張按鈕 -->
        <button id="prevBtn" class="absolute left-2 sm:left-6 top-1/2 -translate-y-1/2 text-white hover:text-blue-400 transition-colors z-50 p-3 sm:p-4 bg-black/40 hover:bg-black/60 rounded-full hidden sm:block">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-8 h-8 sm:w-10 sm:h-10">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
            </svg>
        </button>

        <!-- 主要顯示圖片 -->
        <div class="relative w-full h-full flex items-center justify-center px-4 sm:px-20 py-20">
            <!-- 加入載入中的提示動畫 -->
            <div id="loadingSpinner" class="absolute inset-0 flex items-center justify-center hidden">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-gray-600 border-t-blue-500"></div>
            </div>
            <img id="lightboxImg" class="max-h-full max-w-full object-contain drop-shadow-2xl opacity-0" src="" alt="放大預覽">
        </div>

        <!-- 右側下一張按鈕 -->
        <button id="nextBtn" class="absolute right-2 sm:right-6 top-1/2 -translate-y-1/2 text-white hover:text-blue-400 transition-colors z-50 p-3 sm:p-4 bg-black/40 hover:bg-black/60 rounded-full hidden sm:block">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-8 h-8 sm:w-10 sm:h-10">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
            </svg>
        </button>
        
        <!-- 手機版底部控制列 (僅在小螢幕顯示) -->
        <div class="absolute bottom-6 flex gap-8 z-50 sm:hidden">
             <button id="prevBtnMobile" class="text-white p-3 bg-black/60 rounded-full border border-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
                </svg>
            </button>
             <button id="nextBtnMobile" class="text-white p-3 bg-black/60 rounded-full border border-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        // 設定圖片來源與總數
        const baseURL = "https://cdn.jsdelivr.net/gh/55661234q-commits/2911/";
        const totalImages = 37;
        const gallery = document.getElementById('gallery');
        
        let currentIndex = 0;
        let imagesLoadedCount = 0; // 新增：追蹤已載入的圖片數量

        // 檢查是否所有圖片皆已載入
        function checkAllImagesLoaded() {
            imagesLoadedCount++;
            
            // 更新載入進度文字
            const loadingText = document.getElementById('loadingText');
            if (loadingText) {
                const percent = Math.floor((imagesLoadedCount / totalImages) * 100);
                loadingText.textContent = `載入中... ${percent}%`;
            }

            // 當所有圖片（包含成功與失敗）都處理完畢時，隱藏載入畫面
            if (imagesLoadedCount === totalImages) {
                const pageLoader = document.getElementById('pageLoader');
                setTimeout(() => {
                    pageLoader.classList.add('opacity-0');
                    setTimeout(() => {
                        pageLoader.classList.add('hidden');
                    }, 500);
                }, 300);
            }
        }

        // 初始化畫廊：動態生成 1 到 37 的圖片元素
        function initGallery() {
            for (let i = 1; i <= totalImages; i++) {
                const imgUrl = `${baseURL}${i}.png`;
                
                // 建立外層容器
                const wrapper = document.createElement('div');
                wrapper.className = 'img-card aspect-[3/4] sm:aspect-square overflow-hidden rounded-xl cursor-pointer bg-gray-800 relative group border border-gray-700/50';
                wrapper.onclick = () => openLightbox(i - 1);

                // 建立圖片元素
                const img = document.createElement('img');
                img.alt = `圖片 ${i}`;
                img.className = 'w-full h-full object-cover transition-transform duration-500 group-hover:scale-110 group-hover:opacity-60';
                
                // 註冊圖片載入成功事件
                img.onload = () => checkAllImagesLoaded();
                
                // 建立懸浮遮罩與編號
                const overlay = document.createElement('div');
                overlay.className = 'absolute inset-0 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none';
                overlay.innerHTML = `
                    <div class="bg-black/60 text-white font-semibold py-1 px-3 rounded-full text-sm mb-2 backdrop-blur-sm border border-white/20">
                        # ${i}
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8 text-white drop-shadow-md">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607zM10.5 7.5v6m3-3h-6" />
                    </svg>
                `;

                // 圖片載入失敗處理 (顯示替代圖片)
                img.onerror = function() {
                    this.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 24 24" fill="%23374151"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>';
                    this.classList.add('p-8', 'opacity-50');
                    wrapper.classList.remove('group');
                    overlay.remove();
                    checkAllImagesLoaded(); // 失敗也算處理完成，計數加一
                };

                // 最後設定 src 以觸發載入事件 (移除 lazy loading 以確保背景載入)
                img.src = imgUrl;

                wrapper.appendChild(img);
                wrapper.appendChild(overlay);
                gallery.appendChild(wrapper);
            }
        }

        // --- 燈箱 (Lightbox) 相關功能 ---
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const counter = document.getElementById('imageCounter');
        const loadingSpinner = document.getElementById('loadingSpinner');

        function openLightbox(index) {
            currentIndex = index;
            lightbox.classList.remove('hidden');
            // 延遲一小段時間再加透明度，以觸發 CSS 過渡動畫
            requestAnimationFrame(() => {
                lightbox.classList.remove('opacity-0');
            });
            document.body.style.overflow = 'hidden'; // 防止背景捲動
            updateLightbox();
        }

        function closeLightbox() {
            lightbox.classList.add('opacity-0');
            setTimeout(() => {
                lightbox.classList.add('hidden');
                lightboxImg.src = ''; // 清除圖片以停止載入
                document.body.style.overflow = 'auto'; // 恢復背景捲動
            }, 300); // 配合 CSS 過渡時間
        }

        function updateLightbox() {
            lightboxImg.style.opacity = 0; 
            loadingSpinner.classList.remove('hidden');
            
            // 設定新圖片來源
            const newSrc = `${baseURL}${currentIndex + 1}.png`;
            
            // 預載圖片以獲得更平滑的體驗
            const img = new Image();
            img.onload = () => {
                lightboxImg.src = newSrc;
                counter.textContent = `${currentIndex + 1} / ${totalImages}`;
                loadingSpinner.classList.add('hidden');
                lightboxImg.style.opacity = 1;
            };
            img.onerror = () => {
                // 如果放大圖片載入失敗
                loadingSpinner.classList.add('hidden');
                counter.textContent = `無法載入圖片 ${currentIndex + 1}`;
            };
            img.src = newSrc;
        }

        function nextImage(e) {
            if(e) e.stopPropagation();
            currentIndex = (currentIndex + 1) % totalImages;
            updateLightbox();
        }

        function prevImage(e) {
            if(e) e.stopPropagation();
            currentIndex = (currentIndex - 1 + totalImages) % totalImages;
            updateLightbox();
        }

        // --- 綁定事件監聽器 ---
        
        // 按鈕點擊
        document.getElementById('closeBtn').addEventListener('click', closeLightbox);
        document.getElementById('nextBtn').addEventListener('click', nextImage);
        document.getElementById('prevBtn').addEventListener('click', prevImage);
        document.getElementById('nextBtnMobile').addEventListener('click', nextImage);
        document.getElementById('prevBtnMobile').addEventListener('click', prevImage);
        
        // 點擊背景關閉燈箱
        lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox || e.target.parentElement === lightbox && e.target !== lightboxImg) {
                closeLightbox();
            }
        });

        // 鍵盤導覽 (方向鍵切換、Esc 關閉)
        document.addEventListener('keydown', (e) => {
            if (lightbox.classList.contains('hidden')) return;
            
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
        });

        // 手機觸控滑動 (Swipe) 支援
        let touchstartX = 0;
        let touchendX = 0;
        
        lightbox.addEventListener('touchstart', e => {
            touchstartX = e.changedTouches[0].screenX;
        });
        
        lightbox.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            handleSwipe();
        });
        
        function handleSwipe() {
            const swipeDistance = touchendX - touchstartX;
            // 設定滑動的閾值 (至少滑動 50px 才觸發)
            if (swipeDistance < -50) nextImage();
            if (swipeDistance > 50) prevImage();
        }

        // 啟動程式
        initGallery();

    </script>
</body>
</html>
